<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>モニター情報読取</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ===== メイン画面（常時表示） ===== -->
<header class="app-header">
    <div class="header-row">
        <svg class="header-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <h1>モニター情報読取</h1>
        <span id="capture-time" class="capture-time"></span>
    </div>
    <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="capture" role="tab" aria-selected="true">撮影</button>
        <button class="tab-btn" data-tab="history" role="tab" aria-selected="false">撮影記録</button>
    </div>
</header>

<main>
    <!-- ===== 撮影タブ ===== -->
    <div id="tab-capture" class="tab-panel">

        <!-- モニター種別選択 + 撮影ボタン -->
        <div class="action-bar">
            <div class="monitor-select-row">
                <label class="monitor-select-label" for="monitor-select">モニター種別</label>
                <select id="monitor-select" class="monitor-select">
                    <!-- JS で /api/monitors から動的に生成 -->
                </select>
            </div>
            <button id="capture-btn" class="capture-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
                撮影開始
            </button>
        </div>

        <!-- エラーバナー -->
        <div id="error-banner" class="error-banner hidden"></div>

        <!-- 自動検出バッジ -->
        <div id="detected-monitor" class="detected-monitor hidden"></div>

        <!-- バイタル項目グリッド（常時表示） -->
        <div id="vital-groups"></div>

        <!-- 補足ノート -->
        <div id="notes-card" class="notes-card hidden">
            <strong>補足情報</strong>
            <span id="notes-text"></span>
        </div>

    </div>

    <!-- ===== 撮影記録タブ ===== -->
    <div id="tab-history" class="tab-panel hidden">
        <div class="history-section">
            <div id="history-list" class="history-list">
                <p class="history-empty">記録がありません</p>
            </div>
        </div>
    </div>
</main>


<!-- ===== カメラモーダル ===== -->
<div id="camera-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="カメラ撮影">
    <div class="modal-backdrop" id="modal-backdrop"></div>

    <div class="modal-sheet">
        <!-- モーダルヘッダー -->
        <div class="modal-header">
            <span class="modal-title">撮影</span>
            <button id="modal-close" class="modal-close" type="button" aria-label="閉じる">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- カメラビュー -->
        <div class="camera-viewport">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>

            <!-- カメラエラー -->
            <div id="camera-error" class="camera-error hidden">
                <div class="error-icon">📷</div>
                <p></p>
            </div>

            <!-- 解析中オーバーレイ -->
            <div id="analyzing-overlay" class="analyzing-overlay hidden">
                <div class="spinner"></div>
                <span>解析中...</span>
            </div>
        </div>

        <!-- シャッターエリア -->
        <div class="modal-footer">
            <button id="shutter-btn" class="shutter-btn" type="button" aria-label="撮影">
                <span class="shutter-ring"></span>
                <span class="shutter-dot"></span>
            </button>
        </div>
    </div>
</div>

<script src="/js/camera.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
