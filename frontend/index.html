<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>モニター情報読取</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ===== メイン画面（常時表示） ===== -->
<header class="app-header">
    <div class="header-row">
        <svg class="header-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <h1>モニター情報読取</h1>
        <span id="capture-time" class="capture-time"></span>
    </div>
    <div class="patient-row">
        <button id="patient-selector-btn" class="patient-selector-btn" type="button">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span id="patient-selector-label">患者を選択</span>
            <svg class="patient-selector-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </button>
    </div>
    <div class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="capture"  role="tab" aria-selected="true">撮影</button>
        <button class="tab-btn" data-tab="history"  role="tab" aria-selected="false">撮影記録</button>
        <button class="tab-btn" data-tab="trend"    role="tab" aria-selected="false">トレンド</button>
        <button class="tab-btn" data-tab="patients" role="tab" aria-selected="false">患者管理</button>
    </div>
</header>

<main>
    <!-- ===== 撮影タブ ===== -->
    <div id="tab-capture" class="tab-panel">

        <!-- モニター種別選択 + 撮影ボタン -->
        <div class="action-bar">
            <div class="monitor-select-row">
                <label class="monitor-select-label" for="monitor-select">モニター種別</label>
                <select id="monitor-select" class="monitor-select">
                    <!-- JS で /api/monitors から動的に生成 -->
                </select>
            </div>
            <button id="capture-btn" class="capture-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
                撮影開始
            </button>
        </div>

        <!-- エラーバナー -->
        <div id="error-banner" class="error-banner hidden"></div>

        <!-- 自動検出バッジ -->
        <div id="detected-monitor" class="detected-monitor hidden"></div>

        <!-- バイタル項目グリッド（常時表示） -->
        <div id="vital-groups"></div>

        <!-- 補足ノート -->
        <div id="notes-card" class="notes-card hidden">
            <strong>補足情報</strong>
            <span id="notes-text"></span>
        </div>

    </div>

    <!-- ===== トレンドタブ ===== -->
    <div id="tab-trend" class="tab-panel hidden">

        <!-- 項目選択（チップ） -->
        <div id="trend-field-panel" class="trend-field-panel"></div>

        <!-- 期間選択 -->
        <div class="trend-range-card">
            <div class="trend-range-row">
                <span class="trend-ctrl-label">開始</span>
                <input type="datetime-local" id="trend-start" class="trend-datetime-input">
            </div>
            <div class="trend-range-row">
                <span class="trend-ctrl-label">終了</span>
                <input type="datetime-local" id="trend-end" class="trend-datetime-input">
            </div>
            <button id="trend-search-btn" class="trend-search-btn" type="button">更新</button>
        </div>

        <!-- グラフ -->
        <div class="trend-chart-header">
            <button id="trend-label-toggle" class="trend-label-toggle" type="button">数値表示</button>
        </div>
        <div class="trend-chart-wrap">
            <canvas id="trend-chart"></canvas>
        </div>
        <p id="trend-no-data" class="trend-no-data hidden">この期間のデータがありません</p>

        <!-- 一覧 -->
        <div class="trend-list-section">
            <div class="trend-list-header">
                <span>記録一覧</span>
                <span id="trend-list-units" class="trend-list-units"></span>
            </div>
            <div id="trend-list" class="trend-list">
                <p class="trend-loading">項目を選択してください</p>
            </div>
        </div>

    </div>

    <!-- ===== 撮影記録タブ ===== -->
    <div id="tab-history" class="tab-panel hidden">

        <!-- 日付選択バー -->
        <div class="date-picker-bar">
            <button id="date-prev" class="date-nav-btn" aria-label="前の日">&#8249;</button>
            <input type="date" id="history-date" class="history-date-input">
            <button id="date-next" class="date-nav-btn" aria-label="次の日">&#8250;</button>
        </div>

        <!-- 記録一覧 -->
        <div class="history-section">
            <div id="history-list" class="history-list">
                <p class="history-empty">記録がありません</p>
            </div>
        </div>

    </div>

    <!-- ===== 患者管理タブ ===== -->
    <div id="tab-patients" class="tab-panel hidden">

        <div class="patients-toolbar">
            <button id="new-patient-btn" class="new-patient-btn" type="button">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                新規患者登録
            </button>
        </div>

        <div id="patients-list" class="patients-list">
            <p class="patients-loading">読み込み中...</p>
        </div>

    </div>
</main>


<!-- ===== カメラモーダル ===== -->
<div id="camera-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="カメラ撮影">
    <div class="modal-backdrop" id="modal-backdrop"></div>

    <div class="modal-sheet">
        <!-- モーダルヘッダー -->
        <div class="modal-header">
            <span class="modal-title">撮影</span>
            <button id="modal-close" class="modal-close" type="button" aria-label="閉じる">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- カメラビュー -->
        <div class="camera-viewport">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>

            <!-- カメラエラー -->
            <div id="camera-error" class="camera-error hidden">
                <div class="error-icon">📷</div>
                <p></p>
            </div>

            <!-- 解析中オーバーレイ -->
            <div id="analyzing-overlay" class="analyzing-overlay hidden">
                <div class="spinner"></div>
                <span>解析中...</span>
            </div>
        </div>

        <!-- シャッターエリア -->
        <div class="modal-footer">
            <button id="shutter-btn" class="shutter-btn" type="button" aria-label="撮影">
                <span class="shutter-ring"></span>
                <span class="shutter-dot"></span>
            </button>
        </div>
    </div>
</div>

<!-- ===== 編集モーダル ===== -->
<div id="edit-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="記録を修正">
    <div class="modal-backdrop" id="edit-modal-backdrop"></div>

    <div class="modal-sheet edit-modal-sheet">
        <div class="modal-header edit-modal-header">
            <span class="modal-title edit-modal-title">記録を修正</span>
            <button id="edit-modal-close" class="modal-close edit-modal-close" type="button" aria-label="閉じる">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>

        <div id="edit-modal-body" class="edit-modal-body">
            <!-- フォームフィールドは JS で動的生成 -->
        </div>

        <div class="edit-modal-footer">
            <button id="edit-cancel-btn" class="edit-cancel-btn" type="button">キャンセル</button>
            <button id="edit-delete-btn" class="edit-delete-btn" type="button">削除</button>
            <button id="edit-save-btn" class="edit-save-btn" type="button">保存</button>
        </div>
    </div>
</div>

<!-- ===== 患者選択モーダル ===== -->
<div id="patient-select-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="患者を選択">
    <div class="modal-backdrop" id="patient-select-backdrop"></div>
    <div class="modal-sheet patient-select-sheet">
        <div class="modal-header">
            <span class="modal-title">患者を選択</span>
            <button id="patient-select-close" class="modal-close" type="button" aria-label="閉じる">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="patient-select-body">
            <button id="patient-clear-btn" class="patient-clear-btn" type="button">選択解除（全患者表示）</button>
            <div id="patient-select-list" class="patient-select-list"></div>
        </div>
    </div>
</div>

<!-- ===== 患者編集モーダル ===== -->
<div id="patient-edit-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="患者情報を編集">
    <div class="modal-backdrop" id="patient-edit-backdrop"></div>
    <div class="modal-sheet edit-modal-sheet">
        <div class="modal-header edit-modal-header">
            <span class="modal-title edit-modal-title" id="patient-edit-title">患者を登録</span>
            <button id="patient-edit-close" class="modal-close edit-modal-close" type="button" aria-label="閉じる">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div id="patient-edit-body" class="edit-modal-body"></div>
        <div class="edit-modal-footer">
            <button id="patient-edit-cancel" class="edit-cancel-btn" type="button">キャンセル</button>
            <button id="patient-edit-delete" class="edit-delete-btn hidden" type="button">削除</button>
            <button id="patient-edit-save" class="edit-save-btn" type="button">保存</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="/js/camera.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/trend.js"></script>
<script src="/js/patients.js"></script>
</body>
</html>
